version: '3.8'

services:
  nifi:
    image: apache/nifi:2.8.0
    container_name: nifi
    ports:
      - "9443:9443"
    environment:
      - NIFI_WEB_HTTPS_PORT=9443
      - NIFI_WEB_PROXY_HOST=localhost:9443
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=Admin@12345678
    volumes:
      - ./nifi_data/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - ./nifi_data/content_repository:/opt/nifi/nifi-current/content_repository
      - ./nifi_data/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - ./nifi_data/state:/opt/nifi/nifi-current/state
      - ./nifi_data/logs:/opt/nifi/nifi-current/logs
    restart: unless-stopped
    networks:
      - lakehouse

  nifi-log-cleaner:
    image: alpine:3.20
    container_name: nifi-log-cleaner
    volumes:
      - ./nifi_data/logs:/logs
    command: >
      sh -c "
        while true; do
          echo '[log-cleaner] deleting log files older than 7 days...';
          find /logs -type f \( -name '*.log' -o -name '*.log.*' \) -mtime +7 -print -delete;
          sleep 86400;
        done
      "
    restart: unless-stopped
networks:
  lakehouse:
    external: true